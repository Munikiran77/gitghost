<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitGhost - The Digital Archaeologist for Your Codebase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --accent-color: #e84c1e;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --card-bg: #1a1a1a;
            --danger-bg: rgba(232, 76, 30, 0.1);
            --danger-border: rgba(232, 76, 30, 0.3);
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(232, 76, 30, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(232, 76, 30, 0.04) 0%, transparent 50%);
        }

        header {
            text-align: center;
            padding: 5rem 2rem 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.25rem;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        main {
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
            width: 100%;
        }

        .search-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
        }

        input[type="url"] {
            flex: 1;
            min-width: 250px;
            padding: 1.2rem 1.5rem;
            font-size: 1.1rem;
            background-color: rgba(26, 26, 26, 0.8);
            border: 1px solid #333;
            border-radius: var(--border-radius);
            color: var(--text-main);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-family: inherit;
        }

        input[type="url"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(232, 76, 30, 0.2);
        }

        button {
            padding: 0 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            min-height: 60px;
            box-shadow: 0 4px 15px rgba(232, 76, 30, 0.3);
        }

        button:hover {
            background-color: #ff5a2b;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 76, 30, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #stats {
            text-align: center;
            font-size: 1.4rem;
            color: var(--accent-color);
            font-weight: 800;
            margin-bottom: 2rem;
            min-height: 2rem;
            transition: opacity 0.3s ease;
        }

        .ghost-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid #2a2a2a;
            animation: fadeInUp 0.6s ease-out backwards;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .ghost-card:hover {
            border-color: #3a3a3a;
            transform: translateY(-2px);
        }

        .commit-header {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #2a2a2a;
        }

        .commit-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }

        .commit-meta {
            color: var(--text-secondary);
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .commit-meta span:first-child {
            font-family: 'Fira Code', monospace;
            background: #2a2a2a;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            color: #ccc;
        }

        .deleted-code {
            background-color: rgba(0, 0, 0, 0.5);
            border-left: 3px solid var(--accent-color);
            padding: 1.5rem;
            border-radius: 0 8px 8px 0;
            margin-bottom: 2rem;
            overflow-x: auto;
            font-family: 'Fira Code', Consolas, monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #ff8e8e;
            white-space: pre-wrap;
            word-wrap: break-word;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
        }

        .deleted-code::-webkit-scrollbar {
            height: 8px;
        }

        .deleted-code::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        .analyze-btn {
            background-color: transparent;
            border: 1px solid var(--danger-border);
            color: white;
            width: 100%;
            box-shadow: none;
            min-height: 50px;
        }

        .analyze-btn:hover {
            background-color: var(--danger-bg);
            border-color: var(--accent-color);
            box-shadow: none;
        }

        .analysis-panel {
            margin-top: 1.5rem;
            padding: 2rem;
            border: 1px solid var(--danger-border);
            border-left: 4px solid var(--accent-color);
            border-radius: 0 8px 8px 0;
            background-color: #151515;
            display: none;
            animation: slideDown 0.4s ease-out;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .analysis-panel h3 {
            color: var(--accent-color);
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            font-size: 1.15rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .analysis-panel h3:first-child {
            margin-top: 0;
        }

        .analysis-panel p {
            margin-bottom: 1rem;
            color: #d1d1d1;
            line-height: 1.7;
        }

        .analysis-panel p:last-child {
            margin-bottom: 0;
        }

        .loader {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s ease-in-out infinite;
        }

        .loader.accent {
            border-color: rgba(232, 76, 30, 0.2);
            border-top-color: var(--accent-color);
            margin: 1.5rem auto 0;
            width: 32px;
            height: 32px;
        }

        .error-message {
            background-color: rgba(255, 0, 0, 0.1);
            color: #ff6b6b;
            padding: 1.25rem;
            border-radius: var(--border-radius);
            border: 1px solid #ff6b6b;
            margin-bottom: 2rem;
            text-align: center;
            display: none;
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        footer {
            text-align: center;
            padding: 3rem;
            color: #555;
            font-size: 0.95rem;
            margin-top: auto;
            border-top: 1px solid #1a1a1a;
            letter-spacing: 0.5px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }

            .search-container {
                flex-direction: column;
            }

            input[type="url"] {
                min-width: 100%;
            }

            button {
                width: 100%;
            }

            .ghost-card {
                padding: 1.5rem;
            }

            main {
                padding: 0 1rem 3rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1><span>👻</span> GitGhost</h1>
        <p class="subtitle">The Digital Archaeologist for Your Codebase</p>
    </header>

    <main>
        <div class="search-container">
            <input type="url" id="repoUrl" placeholder="https://github.com/facebook/react" autocomplete="off"
                spellcheck="false" />
            <button id="huntBtn" onclick="huntGhosts()">
                <span id="btnText">Hunt Ghosts 👻</span>
                <div class="loader" id="mainLoader"></div>
            </button>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="stats"></div>

        <div id="results"></div>
    </main>

    <footer>
        GitGhost — Forensic AI for Deleted Logic
    </footer>

    <script>
        const GEMINI_API_KEY = 'AIzaSyCUU4UMM0epQLtKTkW-hUM9aBeCq2-aSw8';

        function showError(msg) {
            const errDiv = document.getElementById('errorMessage');
            errDiv.textContent = msg;
            errDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        function extractOwnerRepo(url) {
            try {
                const urlObj = new URL(url);
                if (urlObj.hostname !== 'github.com') return null;
                const parts = urlObj.pathname.split('/').filter(p => p);
                if (parts.length >= 2) {
                    return { owner: parts[0], repo: parts[1] };
                }
            } catch (e) {
                return null;
            }
            return null;
        }

        async function huntGhosts() {
            const urlInput = document.getElementById('repoUrl').value.trim();
            if (!urlInput) {
                showError("Please enter a GitHub repository URL.");
                return;
            }

            const repoInfo = extractOwnerRepo(urlInput);
            if (!repoInfo) {
                showError("Invalid GitHub URL. Please use the format: https://github.com/owner/repo");
                return;
            }

            const { owner, repo } = repoInfo;

            const btn = document.getElementById('huntBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('mainLoader');
            const resultsDiv = document.getElementById('results');
            const statsDiv = document.getElementById('stats');

            hideError();
            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            resultsDiv.innerHTML = '';
            statsDiv.textContent = 'Summoning spirits...';
            statsDiv.style.opacity = '1';

            try {
                // Fetch commits
                const commitsRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/commits?per_page=10`);
                if (!commitsRes.ok) {
                    throw new Error(`GitHub API Error: ${commitsRes.status} ${commitsRes.statusText}`);
                }
                const commits = await commitsRes.json();

                let ghostsFound = 0;
                let delay = 0;

                // For each commit, fetch diff
                for (const commit of commits) {
                    const sha = commit.sha;
                    const diffRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/commits/${sha}`);
                    if (!diffRes.ok) continue;

                    const diffData = await diffRes.json();
                    if (!diffData.files) continue;

                    let deletedLinesArr = [];

                    for (const file of diffData.files) {
                        if (file.patch) {
                            const lines = file.patch.split('\n');
                            for (const line of lines) {
                                if (line.startsWith('-') && !line.startsWith('---')) {
                                    deletedLinesArr.push(line);
                                }
                            }
                        }
                    }

                    if (deletedLinesArr.length > 0) {
                        ghostsFound++;
                        const deletedCodeStr = deletedLinesArr.join('\n');
                        const commitMsg = commit.commit.message.split('\n')[0];
                        const commitDate = new Date(commit.commit.author.date).toLocaleString(undefined, {
                            month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
                        });

                        // Create card
                        const card = document.createElement('div');
                        card.className = 'ghost-card';
                        card.style.animationDelay = `${delay}s`;
                        delay += 0.1;

                        const safeCode = deletedCodeStr.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        const uiId = 'analysis-' + sha;

                        card.innerHTML = `
                            <div class="commit-header">
                                <div class="commit-title">${commitMsg}</div>
                                <div class="commit-meta">
                                    <span>${sha.substring(0, 7)}</span>
                                    <span>${commitDate}</span>
                                </div>
                            </div>
                            <div class="deleted-code">${safeCode}</div>
                            <button class="analyze-btn" id="btn-${uiId}" onclick="analyzeGhost('${uiId}', \`${encodeURIComponent(deletedCodeStr)}\`)">
                                <span>🔍 Analyze This Ghost</span>
                            </button>
                            <div class="loader accent" id="loader-${uiId}"></div>
                            <div class="analysis-panel" id="${uiId}"></div>
                        `;
                        resultsDiv.appendChild(card);
                    }
                }

                statsDiv.textContent = `${ghostsFound} Ghost${ghostsFound !== 1 ? 's' : ''} Found`;

                if (ghostsFound === 0) {
                    resultsDiv.innerHTML = `
                        <div style="text-align:center; color: #888; padding: 3rem; background: var(--card-bg); border-radius: var(--border-radius); border: 1px dashed #333;">
                            <span style="font-size: 3rem; display: block; margin-bottom: 1rem; opacity: 0.5;">✨</span>
                            No ghosts found in the latest 10 commits. Clean codebase!
                        </div>`;
                }

            } catch (err) {
                statsDiv.textContent = '';
                showError(err.message === 'Failed to fetch' ? 'Network error or rate limit exceeded. Please try again later.' : err.message);
            } finally {
                btn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        async function analyzeGhost(panelId, encodedCode) {
            const code = decodeURIComponent(encodedCode);
            const panel = document.getElementById(panelId);
            const loader = document.getElementById('loader-' + panelId);
            const btn = document.getElementById('btn-' + panelId);

            // Toggle visibility if already analyzed
            if (panel.innerHTML.trim() !== '') {
                if (panel.style.display === 'none') {
                    panel.style.display = 'block';
                    btn.style.backgroundColor = 'var(--danger-bg)';
                    btn.style.borderColor = 'var(--accent-color)';
                    btn.querySelector('span').textContent = '👻 Close Analysis';
                } else {
                    panel.style.display = 'none';
                    btn.style.backgroundColor = 'transparent';
                    btn.style.borderColor = 'var(--danger-border)';
                    btn.querySelector('span').textContent = '🔍 Analyze This Ghost';
                }
                return;
            }

            panel.style.display = 'none';
            btn.style.display = 'none';
            loader.style.display = 'block';

            const prompt = `You are GitGhost, a forensic AI analyst for deleted code. Analyze this deleted code and respond in exactly 3 sections with these headings: What It Did (explain the code's original purpose in plain English), Why It Was Deleted (your best guess based on context), Risk Assessment (what vulnerabilities or failures this deletion might cause). Deleted code:\n${code}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;

                if (!aiText) {
                    throw new Error("No response generated.");
                }

                const formattedHtml = formatAiResponse(aiText);
                panel.innerHTML = formattedHtml;
                panel.style.display = 'block';
                btn.style.backgroundColor = 'var(--danger-bg)';
                btn.style.borderColor = 'var(--accent-color)';

            } catch (err) {
                panel.innerHTML = `<div style="color: #ff6b6b; font-weight: 600;">Error analyzing ghost: ${err.message}. Please check your API key.</div>`;
                panel.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                btn.style.display = 'flex';
                btn.querySelector('span').textContent = '👻 Close Analysis';
            }
        }

        function formatAiResponse(text) {
            // Flexible parsing to enforce headings if the AI diverges slightly
            let html = '';

            // Replace bold headers with actual headers for parsing
            const normalizedText = text.replace(/(?:\*\*|#+)\s*(What It Did|Why It Was Deleted|Risk Assessment):?\s*(?:\*\*|#+)?/gi, '\n---SPLIT---$1\n');
            const parts = normalizedText.split('---SPLIT---').filter(Boolean);

            if (parts.length <= 1) {
                // Fallback if AI didn't use requested sections at all
                return `<p>${text.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</p>`;
            }

            parts.forEach((part, index) => {
                // The first line of part is our Heading (What It Did...)
                const lines = part.split('\n');
                let heading = lines[0].trim();
                let body = lines.slice(1).join('\n').trim();

                // Format basic markdown like bold and links for the body
                body = body
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/`(.*?)`/g, '<code style="background: rgba(255,255,255,0.1); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: \'Fira Code\', monospace; font-size: 0.9em;">$1</code>')
                    .replace(/\n\n/g, '</p><p>')
                    .replace(/\n/g, '<br>');

                html += `<h3>${heading}</h3><p>${body}</p>`;
            });

            return html;
        }
    </script>
</body>

</html>
